document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"8e8fce6f-2f1e-449a-bf28-27d8e8afec8c\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box;}\n  html,body{margin:0;height:100%;background:#1f1f1f;}\n  button:focus{outline:none;}\n  ::-webkit-scrollbar{width:11px;height:11px;}\n  ::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:6px;border:2px solid transparent;background-clip:content-box;}\n  ::-webkit-scrollbar-thumb:hover{background:#4a4a4a;background-clip:content-box;}\n  @keyframes apvPulse{0%{transform:scale(.8);opacity:.85}70%{transform:scale(2.4);opacity:0}100%{opacity:0}}\n  @keyframes apvDash{to{stroke-dashoffset:-18}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div id=\"apvRoot\" style=\"position:relative;height:100vh;display:flex;flex-direction:column;background:#1f1f1f;color:#cccccc;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:15px;overflow:hidden;\">\n\n  <div style=\"display:flex;align-items:center;gap:16px;height:48px;flex:none;padding:0 16px;background:#181818;border-bottom:1px solid #2b2b2b;\">\n    <div style=\"display:flex;align-items:center;gap:9px;\">\n      <div style=\"width:11px;height:11px;border-radius:2px;background:#3794ff;\"><\u002Fdiv>\n      <span style=\"font-weight:600;letter-spacing:.2px;font-size:15px;\">ApiVista<\u002Fspan>\n      <span style=\"color:#6e6e6e;font-size:13.5px;\">{{ depthTitle }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"width:1px;height:22px;background:#2b2b2b;\"><\u002Fdiv>\n    <div style=\"display:flex;gap:2px;background:#1f1f1f;border:1px solid #2b2b2b;border-radius:8px;padding:2px;\">\n      <button onclick=\"{{ onDepRoute }}\" style=\"{{ s.depRoute }}\">ルート連携<\u002Fbutton>\n      <button onclick=\"{{ onDepFile }}\" style=\"{{ s.depFile }}\">ファイル単位<\u002Fbutton>\n      <button onclick=\"{{ onDepFunc }}\" style=\"{{ s.depFunc }}\">関数単位<\u002Fbutton>\n t)\n      ));\n    };\n    block(leftX,this.COL.apicall,'フロントエンド','呼び出し元',fe.length);\n    block(rightX,this.COL.route,'バックエンド','呼び出し先',be.length);\n\n    // edges svg\n    const edgeEls=[];\n    // structural (import / call) = solid colored tree connectors with arrowhead\n    guides.forEach((g,i)=>{\n      if(g.v){ edgeEls.push(h('path',{key:'gv'+i,d:'M'+g.x+','+g.y1+' L'+g.x+','+g.y2,fill:'none',stroke:'#7d7d7d',strokeWidth:2})); }\n      else {\n        edgeEls.push(h('path',{key:'gh'+i,d:'M'+g.x1+','+g.y+' L'+(g.x2-6)+','+g.y,fill:'none',stroke:g.color,strokeWidth:2}));\n        edgeEls.push(h('path',{key:'ga'+i,d:'M'+(g.x2-8)+','+(g.y-4.5)+' L'+g.x2+','+g.y+' L'+(g.x2-8)+','+(g.y+4.5)+' Z',fill:g.color}));\n      }\n    });\n    // linkage (backend ↔ frontend) = arrowed bezier across the gutter\n    ds.edges.filter(e=>e.kind==='linkage').forEach(e=>{\n      const sp=pos[e.source], tp=pos[e.target];\n      if(!sp||!tp) return;\n      const hi=focus && (e.source===focus||e.target===focus);\n      const dim=focus && !hi;\n      const col=hi?'#e8e8e8':dim?'#383838':'#8a8a8a';\n      const mk=hi?'apvH':dim?'apvD':'apvN';\n      const sa = sp.side==='frontend'?{x:sp.x+W,y:sp.y+H/2}:{x:sp.x,y:sp.y+H/2};\n      const ta = tp.side==='frontend'?{x:tp.x+W,y:tp.y+H/2}:{x:tp.x,y:tp.y+H/2};\n      const mx=(sa.x+ta.x)/2;\n      const d='M'+sa.x+','+sa.y+' C'+mx+','+sa.y+' '+mx+','+ta.y+' '+ta.x+','+ta.y;\n      edgeEls.push(h('path',{key:e.id,d:d,fill:'none',stroke:col,strokeWidth:hi?2.4:1.7,markerEnd:'url(#'+mk+')',opacity:dim?.5:1,style:hi?{animation:'apvDash .6s linear infinite'}:null}));\n    });\n    const mkDef=(id,c)=> h('marker',{id:id,key:id,viewBox:'0 0 10 10',refX:'8.5',refY:'5',markerWidth:'7.5',markerHeight:'7.5',orient:'auto-start-reverse'}, h('path',{d:'M0,0 L10,5 L0,10 z',fill:c}));\n    kids.push(h('svg',{key:'svg',width:canvasW,height:canvasH,style:{position:'absolute',left:0,top:0,pointerEvents:'none',overflow:'visible'}},\n      h('defs',null, mkDef('apvN','#8a8a8a'), mkDef('apvH','#e8e8e8'), mkDef('apvD','#383838')),\n      edgeEls));\n\n    // nodes, each with its warnings placed directly underneath\n    const renderCol=(col)=>{\n      col.out.forEach(it=>{\n        if(it.k==='node') kids.push(this.card(it.n,it.x,it.y,focus,nbr,it.inst));\n        else if(it.k==='warn') kids.push(this.warnRow(it.w,it.x,it.y,it.orphan));\n        else if(it.k==='ohead') kids.push(h('div',{key:'oh'+it.x+it.y,style:{position:'absolute',left:it.x,top:it.y+2,fontSize:11.5,fontWeight:600,color:'#6e6e6e',letterSpacing:'.2px',pointerEvents:'none'}},'該当ノードのない警告'));\n      });\n    };\n    renderCol(feCol); renderCol(beCol);\n\n    return h('div',{style:{position:'relative',width:canvasW,height:canvasH,margin:'20px auto'}}, kids);\n  }\n\n  renderOverlay() {\n    const h=React.createElement;\n    const c=this.state.connector;\n    if(!c) return null;\n    const mx=(c.x1+c.x2)/2;\n    const d='M'+c.x1+','+c.y1+' C'+mx+','+c.y1+' '+mx+','+c.y2+' '+c.x2+','+c.y2;\n    return h('svg',{style:{position:'absolute',left:0,top:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:50,overflow:'visible'}},\n      h('defs',null, h('marker',{id:'apvConn',viewBox:'0 0 10 10',refX:'7',refY:'5',markerWidth:'8',markerHeight:'8',orient:'auto-start-reverse'},h('path',{d:'M0,0 L10,5 L0,10 z',fill:this.RED}))),\n      h('path',{d:d,fill:'none',stroke:this.RED,strokeWidth:4,opacity:.18}),\n      h('path',{d:d,fill:'none',stroke:this.RED,strokeWidth:1.7,strokeDasharray:'6 4',markerEnd:'url(#apvConn)',style:{animation:'apvDash .6s linear infinite'}}),\n      h('circle',{cx:c.x1,cy:c.y1,r:3.5,fill:this.RED}),\n      h('circle',{cx:c.x2,cy:c.y2,r:6,fill:'none',stroke:this.RED,strokeWidth:2,style:{transformOrigin:c.x2+'px '+c.y2+'px',animation:'apvPulse 1.3s ease-out infinite'}}),\n      h('circle',{cx:c.x2,cy:c.y2,r:4,fill:this.RED})\n    );\n  }\n\n  renderToast() {\n    const h=React.createElement;\n    if(!this.state.toast) return null;\n    return h('div',{style:{position:'absolute',left:'50%',bottom:24,transform:'translateX(-50%)',zIndex:60,background:'#2d2d30',border:'1px solid #3a3a3a',borderRadius:8,padding:'9px 17px',fontSize:13,color:'#e0e0e0',boxShadow:'0 8px 26px rgba(0,0,0,.5)',pointerEvents:'none'}}, this.state.toast);\n  }\n\n  clickNode(id){\n    this.setState(s=>({selectedNode: s.selectedNode===id?null:id}));\n    const n=this.data()[this.state.depth].nodes.find(x=>x.id===id);\n    if(n) this.flashToast('↗ '+n.sub+' を開く');\n  }\n  flashToast(msg){\n    this.setState({toast:msg});\n    clearTimeout(this._tt);\n    this._tt=setTimeout(()=>this.setState({toast:null}),1600);\n  }\n  warnClick(w){\n    const nid=w.node[this.state.depth];\n    if(!nid || !this.data()[this.state.depth].nodes.find(n=>n.id===nid)){ this.flashToast('このビューに該当ノードはありません'); return; }\n    this.setState({selectedNode:nid});\n    this.flashToast('ノードにフォーカスしました');\n  }\n\n  segStyle(active){ return {appearance:'none',border:'none',background:active?'#0e639c':'transparent',color:active?'#fff':'#cccccc',padding:'5px 13px',borderRadius:6,fontSize:13.5,cursor:'pointer',fontFamily:'inherit'}; }\n\n  renderVals() {\n    const d=this.state.depth;\n    return {\n      depthTitle: d==='route'?'ルート連携グラフ': d==='file'?'ファイル連携グラフ':'関数連携グラフ',\n      graph: this.renderGraph(),\n      toast: this.renderToast(),\n      onDepRoute:()=>this.setState({depth:'route',selectedNode:null,activeWarn:null,connector:null}),\n      onDepFile:()=>this.setState({depth:'file',selectedNode:null,activeWarn:null,connector:null}),\n      onDepFunc:()=>this.setState({depth:'function',selectedNode:null,activeWarn:null,connector:null}),\n      s:{ depRoute:this.segStyle(d==='route'), depFile:this.segStyle(d==='file'), depFunc:this.segStyle(d==='function') },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

services:
  redmine:
    image: redmine:5.1
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      REDMINE_DB_POSTGRES: redmine-db
      REDMINE_DB_DATABASE: ${REDMINE_DB_DATABASE:-redmine}
      REDMINE_DB_USERNAME: ${REDMINE_DB_USERNAME:-redmine}
      REDMINE_DB_PASSWORD: ${REDMINE_DB_PASSWORD}
      REDMINE_SECRET_KEY_BASE: ${REDMINE_SECRET_KEY_BASE}
    volumes:
      - redmine_data:/usr/src/redmine/files
    depends_on:
      - redmine-db

  redmine-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${REDMINE_DB_DATABASE:-redmine}
      POSTGRES_USER: ${REDMINE_DB_USERNAME:-redmine}
      POSTGRES_PASSWORD: ${REDMINE_DB_PASSWORD}
    volumes:
      - redmine_db_data:/var/lib/postgresql/data

volumes:
  redmine_data:
  redmine_db_data:
